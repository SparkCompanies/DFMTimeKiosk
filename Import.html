function getMonday(d) {
  var dt = new Date(d || new Date());
  var day = dt.getDay();

function calcDayHours(punches) {
  var sorted = punches.slice().sort(function (a, b) {
    return new Date(a.time) - new Date(b.time);
  });
  var gross = 0,
    breakMs = 0;
  for (var i = 0; i < sorted.length; i++) {
    var p = sorted[i];
    if (p.type === "in") {
      var outP = null;
      for (var j = i + 1; j < sorted.length; j++) {
        if (sorted[j].type === "out" || sorted[j].type === "break-out") {
          outP = sorted[j];
          break;
        }
      }
      if (outP) {
        gross += new Date(outP.time) - new Date(p.time);
      } else {
        gross += Date.now() - new Date(p.time).getTime();
      }
    }
    if (p.type === "break-out") {
      var bIn = null;
      for (var j2 = i + 1; j2 < sorted.length; j2++) {
        if (sorted[j2].type === "break-in") {
          bIn = sorted[j2];
          break;
        }
      }
      if (bIn) {
        breakMs += new Date(bIn.time) - new Date(p.time);
      } else {
        breakMs += Date.now() - new Date(p.time).getTime();
      }
    }
    if (p.type === "break-in" && i > 0) {
      var prevOut = null;
      for (var j3 = i - 1; j3 >= 0; j3--) {
        if (sorted[j3].type === "break-out") {
          prevOut = sorted[j3];
          break;
        }
      }
      if (!prevOut) {
        var outP2 = null;
        for (var j4 = i + 1; j4 < sorted.length; j4++) {
          if (sorted[j4].type === "out" || sorted[j4].type === "break-out") {
            outP2 = sorted[j4];
            break;
          }
        }
        if (outP2) {
          gross += new Date(outP2.time) - new Date(p.time);
        } else {
          gross += Date.now() - new Date(p.time).getTime();
        }
      }
    }
  }
  var net = gross - breakMs;
  return {
    grossH: gross / 3600000,
    breakH: breakMs / 3600000,
    netH: Math.max(0, net / 3600000)
  };
}
function calcWeekHours(allPunches, eid) {
  var monday = getMonday();
  var total = 0;
  for (var i = 0; i < 7; i++) {
    var ds = new Date(monday);
    ds.setDate(ds.getDate() + i);
    ds.setHours(0, 0, 0, 0);
    var de = new Date(ds);
    de.setHours(23, 59, 59, 999);
    var dp = allPunches.filter(function (p) {
      return p.eid === eid && new Date(p.time) >= ds && new Date(p.time) <= de;
    });
    total += calcDayHours(dp).netH;
  }
  return parseFloat(total.toFixed(1));
}
function calcWeekHoursForWeek(allPunches, eid, monday) {
  var total = 0;
  for (var i = 0; i < 7; i++) {
    var ds = new Date(monday);
    ds.setDate(ds.getDate() + i);
    ds.setHours(0, 0, 0, 0);
    var de = new Date(ds);
    de.setHours(23, 59, 59, 999);
    var dp = allPunches.filter(function (p) {
      return p.eid === eid && new Date(p.time) >= ds && new Date(p.time) <= de;
    });
    total += calcDayHours(dp).netH;
  }
  return parseFloat(total.toFixed(1));
}
function getDailyBreakdown(allPunches, eid) {
  var monday = getMonday();
  return DAYS.map(function (d, i) {
    var ds = new Date(monday);
    ds.setDate(ds.getDate() + i);
    ds.setHours(0, 0, 0, 0);
    var de = new Date(ds);
    de.setHours(23, 59, 59, 999);
    var dp = allPunches.filter(function (p) {
      return p.eid === eid && new Date(p.time) >= ds && new Date(p.time) <= de;
    });
    return {
      day: d,
      hrs: parseFloat(calcDayHours(dp).netH.toFixed(1)),
      isToday: ds.toDateString() === new Date().toDateString()
    };
  });
}
function getDailyBreakdownForWeek(allPunches, eid, monday) {
  return DAYS.map(function (d, i) {
    var ds = new Date(monday);
    ds.setDate(ds.getDate() + i);

    });
    return {
      day: d,
      date: new Date(ds),
      hrs: parseFloat(calcDayHours(dp).netH.toFixed(1)),
      isToday: ds.toDateString() === new Date().toDateString(),
      punches: dp.sort(function (a, b) {

}
function getCurrentState(emp, punches) {
  var ep = punches.filter(function (p) {
    return p.eid === emp.id;
  }).sort(function (a, b) {
    return new Date(b.time) - new Date(a.time);
  });
  var last = ep[0];
  if (!last || last.type === "out") return {
    status: "out",
    label: "Clocked Out",
    color: C.t4,
    next: "in",
    since: last ? last.time : null
  };
  if (last.type === "break-out") return {
    status: "break",
    label: "On Break",
    color: C.blue,
    next: "break-in",
    since: last.time
  };
  if (last.type === "in" || last.type === "break-in") return {
    status: "in",
    label: "Working",
    color: C.green,
    next: "out",
    since: last.time
  };
  return {
    status: "out",
    label: "Clocked Out",
    color: C.t4,
    next: "in",
    since: null
  };
}

  if (cs.status === "out") return [{
    k: "in",

  if (cs.status === "in") return [{
    k: "break-out",
    l: "Start Break",
    c: C.blue
  }, {
    k: "out",
    l: "Clock Out",
    c: C.red
  }];
  if (cs.status === "break") return [{
    k: "break-in",
    l: "End Break",
    c: C.blue
  }, {
    k: "out",
    l: "Clock Out",
    c: C.red
  }];

    c: C.green
  }];
}
function calcPts(eid, events, policy) {
  var cutoff = Date.now() - (policy || DEFAULT_POLICY).rollingDays * 24 * 60 * 60 * 1000;
  return parseFloat(events.filter(function (e) {
    return e.eid === eid && new Date(e.date).getTime() >= cutoff;
  }).reduce(function (s, e) {
    return s + e.pts;
  }, 0).toFixed(1));
}
function detectExceptions(emp, punches, policy) {
  var P = policy || DEFAULT_POLICY;
  var excs = [];
  var today = getToday();
  var now = new Date();
  var todayP = punches.filter(function (p) {
    return p.eid === emp.id && new Date(p.time) >= today;
  }).sort(function (a, b) {
    return new Date(a.time) - new Date(b.time);
  });
  var dayOfWeek = now.getDay();
  var isWorkDay = (emp.workDays || [1, 2, 3, 4, 5]).includes(dayOfWeek);
  if (isWorkDay && emp.shiftStart) {
    var shParts = emp.shiftStart.split(":");
    var shH = parseInt(shParts[0]),
      shM = parseInt(shParts[1] || 0);
    var shiftTime = new Date(today);
    shiftTime.setHours(shH, shM, 0, 0);
    var graceTime = new Date(shiftTime.getTime() + P.graceMins * 60000);
    if (now > graceTime) {
      var clockIn = todayP.find(function (p) {
        return p.type === "in";
      });
      if (!clockIn) {
        excs.push({
          type: "no-show",
          label: "No Show",
          color: C.red,
          detail: "Expected " + emp.shiftStart,
          sev: 3
        });
      } else if (new Date(clockIn.time) > graceTime) {
        var lateMins = Math.round((new Date(clockIn.time) - shiftTime) / 60000);
        if (lateMins > 30) excs.push({
          type: "tardy-long",
          label: "Tardy >30m",
          color: C.red,
          detail: lateMins + "m late",
          sev: 2
        });else excs.push({
          type: "tardy-short",
          label: "Tardy",
          color: C.orange,
          detail: lateMins + "m late",
          sev: 1
        });
      }
    }
  }
  var weekH = calcWeekHours(punches, emp.id);
  if (weekH >= P.otWeekly) excs.push({
    type: "ot-weekly",
    label: "Weekly OT",
    color: C.orange,
    detail: weekH.toFixed(1) + "h",
    sev: 2
  });else if (weekH >= P.otWeekly - 2) excs.push({
    type: "ot-approaching",
    label: "OT Risk",
    color: C.spark,
    detail: weekH.toFixed(1) + "h / " + P.otWeekly,
    sev: 1
  });
  if (emp.pts >= 8) excs.push({
    type: "pts-critical",
    label: "Term Risk",
    color: C.red,
    detail: emp.pts + " pts",
    sev: 3
  });else if (emp.pts >= 6) excs.push({
    type: "pts-high",
    label: "High Pts",
    color: C.orange,
    detail: emp.pts + " pts",
    sev: 2
  });
  /* missed break check */
  var cs = getCurrentState(emp, punches);
